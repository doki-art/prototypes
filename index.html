<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prototypes</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ee;
      --ink: #1a1714;
      --muted: #8c877f;
      --rule: #ddd8d0;
      --archived: #b0a99f;
      --tag-bg: #eae6e0;
      --accent: #c8522a;
      --card-bg: #faf8f5;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Geist', sans-serif;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 48px 60px 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }

    .wordmark {
      font-weight: 300;
      font-size: 32px;
      letter-spacing: -1px;
      padding-bottom: 20px;
    }

    .meta {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.05em;
      text-align: right;
      padding-bottom: 22px;
    }

    .meta strong {
      display: block;
      font-size: 20px;
      font-weight: 300;
      letter-spacing: -0.5px;
      color: var(--ink);
    }

    /* ── TABS ── */
    .tabs-bar {
      display: flex;
      align-items: flex-end;
      padding: 0 60px;
      border-bottom: 1px solid var(--rule);
    }

    .tab {
      padding: 12px 20px;
      font-size: 12px;
      font-family: 'Geist', sans-serif;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
      user-select: none;
    }

    .tab:hover { color: var(--ink); }

    .tab.active {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    .tab-count {
      font-size: 10px;
      background: var(--tag-bg);
      color: var(--muted);
      padding: 1px 6px;
      border-radius: 20px;
    }

    .tab.active .tab-count {
      background: var(--ink);
      color: var(--bg);
    }

    /* ── MAIN ── */
    main { padding: 40px 60px 80px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── GRID TABLE ── */
    .section-block { margin-bottom: 48px; }
    .archived-section-block { margin-top: 8px; }

    .grid-table {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 130px 1fr 90px 60px;
    }

    /* Header row */
    .grid-header {
      display: contents;
    }

    .grid-header > div {
      padding: 0 16px 10px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
    }

    .grid-header > div:first-child { padding-left: 0; }
    .grid-header > div:last-child  { padding-right: 0; }

    .col-section-name {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-name-count {
      font-size: 10px;
      color: var(--muted);
      background: var(--tag-bg);
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0;
      text-transform: none;
    }

    /* Data rows */
    .grid-row {
      display: contents;
    }

    .grid-row > div {
      padding: 13px 16px;
      border-bottom: 1px solid var(--rule);
      display: flex;
      align-items: center;
      transition: background 0.12s;
    }

    .grid-row > div:first-child { padding-left: 0; }
    .grid-row > div:last-child  { padding-right: 0; }

    /* last row — remove border */
    .grid-row.last-row > div { border-bottom: none; }

    /* hover all cells in row */
    .grid-row:hover > div { background: var(--card-bg); }

    .project-name {
      font-weight: 400;
      font-size: 14px;
      color: var(--ink);
    }

    .archived-row .project-name { color: var(--archived); }

    .tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--tag-bg);
      color: var(--muted);
      text-transform: uppercase;
    }

    .tag.active-tag {
      background: #e8f0e8;
      color: #3d6b3d;
    }

    .note-cell { color: var(--muted); }
    .date-cell { color: var(--muted); font-size: 12px; }

    .link-cell a {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .link-cell a:hover { opacity: 0.6; }
    .link-cell a svg { width: 11px; height: 11px; flex-shrink: 0; }

    .empty {
      grid-column: 1 / -1;
      padding: 24px 0;
      color: var(--muted);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--rule);
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 11px;
    }

    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #6aab6a;
      margin-right: 6px;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-cell {
      opacity: 0;
      animation: fadeUp 0.3s ease forwards;
    }

    @media (max-width: 680px) {
      header, .tabs-bar, main, footer { padding-left: 20px; padding-right: 20px; }
      header { flex-direction: column; align-items: flex-start; }
      .meta { text-align: left; }
      .tab { padding: 10px 14px; }
      .grid-table { display: block; }
      .grid-header { display: none; }
      .grid-row {
        display: flex;
        flex-direction: column;
        padding: 14px 0;
        border-bottom: 1px solid var(--rule);
      }
      .grid-row > div { border: none; padding: 2px 0; }
    }
  </style>
</head>
<body>

<header>
  <div class="wordmark">Prototypes</div>
  <div class="meta">
    <strong id="total-count">—</strong>
    active demos
  </div>
</header>

<nav class="tabs-bar" id="tabs-bar"></nav>
<main id="main"></main>

<footer>
  <span><span class="dot"></span>GitHub Pages</span>
  <span id="footer-date"></span>
</footer>

<script>
  // ═══════════════════════════════════════════════════════
  // YOUR PROTOTYPES
  // client:  "TabName"  → which tab it appears in
  // section: "App"      → subsection within the tab (optional)
  // ═══════════════════════════════════════════════════════
  const prototypes = [

    // ── SALESFLOW — App
    {
      name: "Billing Frequency Modal",
      tag: "Billing",
      notes: "Proration logic, plan downgrade flow",
      updated: "Apr 2026",
      path: "salesflow/billing-modal/",
      client: "Salesflow",
      section: "App",
      archived: false
    },
    {
      name: "Onboarding v3",
      tag: "Onboarding",
      notes: "Revised welcome + setup steps",
      updated: "Mar 2026",
      path: "salesflow/onboarding-v3/",
      client: "Salesflow",
      section: "App",
      archived: false
    },
    {
      name: "Legacy Nav",
      tag: "Nav",
      notes: "Old navigation pattern",
      updated: "Jan 2025",
      path: "salesflow/archived/legacy-nav/",
      client: "Salesflow",
      section: "App",
      archived: true
    },

    // ── SALESFLOW — Landing
    {
      name: "Pricing Landing Page",
      tag: "Pricing",
      notes: "Full Page",
      updated: "Mar 2026",
      path: "https://doki-art.github.io/salesflow/landing/pricing.html",
      client: "Salesflow",
      section: "Landing",
      archived: false
    },

    // ── DOKIART
    {
      name: "Portfolio Landing",
      tag: "Web",
      notes: "Hero section explorations",
      updated: "Mar 2026",
      path: "dokiart/portfolio-landing/",
      client: "Dokiart",
      archived: false
    },
    {
      name: "Gallery View",
      tag: "UI",
      notes: "Grid vs masonry layout test",
      updated: "Feb 2026",
      path: "dokiart/gallery-view/",
      client: "Dokiart",
      archived: false
    },

    // ── OTHER
    {
      name: "BFDO landing page",
      tag: "Landing",
      notes: "Responsive Landing Page",
      updated: "Apr 2026",
      path: "https://doki-art.github.io/bfdo/index.html",
      client: "Other",
      archived: false
    }

  ];
  // ═══════════════════════════════════════════════════════

  const base = window.location.href.replace(/index\.html$/, '');
  const arrowSvg = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10L10 2M5 2h5v5"/></svg>`;
  const clients = [...new Set(prototypes.map(p => p.client))];
  let delayCounter = 0;

  function makeRow(p, isLast) {
    const row = document.createElement('div');
    row.className = 'grid-row' + (p.archived ? ' archived-row' : '') + (isLast ? ' last-row' : '');
    const d = (delayCounter++) * 50;
    const href = p.path.startsWith('http') ? p.path : base + p.path;
    row.innerHTML = `
      <div class="fade-cell" style="animation-delay:${d}ms"><span class="project-name">${p.name}</span></div>
      <div class="fade-cell" style="animation-delay:${d}ms"><span class="tag ${p.archived ? '' : 'active-tag'}">${p.tag}</span></div>
      <div class="note-cell fade-cell" style="animation-delay:${d}ms">${p.notes}</div>
      <div class="date-cell fade-cell" style="animation-delay:${d}ms">${p.updated}</div>
      <div class="link-cell fade-cell" style="animation-delay:${d}ms"><a href="${href}" target="_blank">Open ${arrowSvg}</a></div>`;
    return row;
  }

  function makeGrid(label, items) {
    const block = document.createElement('div');
    block.className = 'section-block';

    const grid = document.createElement('div');
    grid.className = 'grid-table';

    // header: section label + count in col 1, other col labels
    const header = document.createElement('div');
    header.className = 'grid-header';
    header.innerHTML = `
      <div><span class="col-section-name">${label}<span class="section-name-count">${items.length}</span></span></div>
      <div>Tag</div>
      <div>Notes</div>
      <div>Updated</div>
      <div></div>`;
    grid.appendChild(header);

    if (!items.length) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = 'Nothing here yet.';
      grid.appendChild(empty);
    } else {
      items.forEach((p, i) => grid.appendChild(makeRow(p, i === items.length - 1)));
    }

    block.appendChild(grid);
    return block;
  }

  const tabsBar = document.getElementById('tabs-bar');
  const mainEl  = document.getElementById('main');

  clients.forEach((client, i) => {
    const clientItems = prototypes.filter(p => p.client === client);
    const activeCount = clientItems.filter(p => !p.archived).length;

    // tab
    const tab = document.createElement('button');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.dataset.client = client;
    tab.innerHTML = `${client} <span class="tab-count">${activeCount}</span>`;
    tab.addEventListener('click', () => switchTab(client));
    tabsBar.appendChild(tab);

    // panel
    const panel = document.createElement('div');
    panel.className = 'tab-panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel-' + client;

    const sections = [...new Set(clientItems.map(p => p.section).filter(Boolean))];
    const allArchived = clientItems.filter(p => p.archived);

    if (sections.length > 0) {
      sections.forEach(sec => {
        const secActive = clientItems.filter(p => p.section === sec && !p.archived);
        panel.appendChild(makeGrid(sec, secActive));
      });
    } else {
      const active = clientItems.filter(p => !p.archived);
      panel.appendChild(makeGrid('Active', active));
    }

    // archived always last
    if (allArchived.length) {
      const ab = makeGrid('Archived', allArchived);
      ab.classList.add('archived-section-block');
      panel.appendChild(ab);
    }

    mainEl.appendChild(panel);
  });

  function switchTab(client) {
    document.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', t.dataset.client === client));
    document.querySelectorAll('.tab-panel').forEach(p =>
      p.classList.toggle('active', p.id === 'panel-' + client));
    delayCounter = 0;
    document.querySelectorAll('#panel-' + client + ' .fade-cell').forEach(d => {
      d.style.animation = 'none';
      void d.offsetHeight;
      d.style.animation = '';
    });
  }

  document.getElementById('total-count').textContent =
    prototypes.filter(p => !p.archived).length;

  document.getElementById('footer-date').textContent =
    new Date().toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
</script>

</body>
</html>
